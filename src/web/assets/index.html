<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>alter — process manager</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo">alter</span>
        <span class="logo-sub">pm</span>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn nav-btn-active" onclick="showView('processes')">
          <span class="nav-icon">▦</span> Processes
        </button>
        <button class="nav-btn" onclick="showView('start')">
          <span class="nav-icon">+</span> Start Process
        </button>

        <div class="sidebar-section-label">RUNNING</div>
        <div id="sidebar-process-list"></div>
      </nav>

      <div class="sidebar-footer">
        <div id="daemon-status" class="badge badge-ok">● connected</div>
        <div id="uptime-label" class="dim sidebar-uptime"></div>
        <div class="sidebar-actions">
          <button class="sidebar-btn" onclick="saveState()" title="Save state">💾 Save</button>
          <button class="sidebar-btn sidebar-btn-danger" onclick="shutdownDaemon()" title="Shutdown daemon">⏻ Shutdown</button>
          <label class="sidebar-btn check-label" title="Auto-refresh every 3s">
            <input type="checkbox" id="auto-refresh" checked onchange="toggleAutoRefresh()"/>
            Auto-refresh
          </label>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <div class="content">

      <!-- Processes view -->
      <div id="view-processes" class="view">
        <div class="view-header">
          <h2 class="view-title">Processes</h2>
          <button onclick="loadProcesses()">↻ Refresh</button>
        </div>

        <div class="process-section">
          <table id="process-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Status</th>
                <th>PID</th>
                <th>Uptime</th>
                <th>Restarts</th>
                <th>Watch</th>
                <th>Last Run</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="process-tbody">
              <tr><td colspan="8" class="empty">Loading...</td></tr>
            </tbody>
          </table>
        </div>

        <section class="log-section" id="log-section" style="display:none">
          <div class="log-header">
            <span id="log-title">Logs</span>
            <button onclick="closeLogs()">✕ Close</button>
          </div>
          <div id="log-date-nav" class="log-date-nav"></div>
          <div id="log-output" class="log-output"></div>
        </section>
      </div>

      <!-- Start Process view -->
      <div id="view-start" class="view" style="display:none">
        <div class="view-header">
          <h2 class="view-title">Start New Process</h2>
        </div>

        <div class="form-card">
          <form class="start-form" onsubmit="startProcess(event)">
            <div class="form-row">
              <div class="form-field">
                <label for="sf-script">Command <span class="required">*</span></label>
                <input id="sf-script" type="text" placeholder="node app.js" required/>
              </div>
              <div class="form-field">
                <label for="sf-name">Name</label>
                <input id="sf-name" type="text" placeholder="my-app"/>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label for="sf-cwd">Working Directory</label>
                <input id="sf-cwd" type="text" placeholder="C:\Users\me\app"/>
              </div>
              <div class="form-field">
                <label for="sf-namespace">Namespace</label>
                <input id="sf-namespace" type="text" placeholder="default"/>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label for="sf-args">Args (space-separated)</label>
                <input id="sf-args" type="text" placeholder="--port 3000 --env prod"/>
              </div>
              <div class="form-field">
                <label for="sf-env">Env Vars (KEY=VAL, comma-separated)</label>
                <input id="sf-env" type="text" placeholder="NODE_ENV=production,PORT=3000"/>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field form-field-checks">
                <label class="check-label">
                  <input type="checkbox" id="sf-autorestart" checked/>
                  Auto-restart on crash
                </label>
                <label class="check-label">
                  <input type="checkbox" id="sf-watch"/>
                  Watch mode
                </label>
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn-primary">▶ Start</button>
              <span id="start-form-error" class="form-error"></span>
            </div>
          </form>
        </div>
      </div>

      <!-- Process Detail view (logs + actions) -->
      <div id="view-process-detail" class="view view-detail" style="display:none">
        <div class="detail-toolbar">
          <div class="detail-proc-info">
        <span id="detail-proc-dot" class="sidebar-proc-dot">●</span>
        <span id="detail-proc-name" class="detail-proc-name"></span>
        <span id="detail-proc-status" class="detail-proc-status dim"></span>
          </div>
          <div class="detail-actions">
        <button class="action-btn" id="detail-btn-start" onclick="detailStart()" style="display:none">▶ Start</button>
        <button class="action-btn" id="detail-btn-restart" onclick="detailRestart()">↺ Restart</button>
        <button class="action-btn" id="detail-btn-stop" onclick="detailStop()">■ Stop</button>
        <button class="action-btn" onclick="detailEdit()">✎ Edit</button>
        <button class="action-btn action-btn-danger" onclick="detailDelete()">✕ Delete</button>
        <button class="action-btn action-btn-vscode" id="detail-btn-vscode" onclick="detailOpenVSCode()" title="Open working directory in VS Code">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M23.15 2.587L18.21.21a1.494 1.494 0 0 0-1.705.29l-9.46 8.63-4.12-3.128a.999.999 0 0 0-1.276.057L.327 7.261A1 1 0 0 0 .326 8.74L3.899 12 .326 15.26a1 1 0 0 0 .001 1.479L1.65 17.94a.999.999 0 0 0 1.276.057l4.12-3.128 9.46 8.63a1.492 1.492 0 0 0 1.704.29l4.942-2.377A1.5 1.5 0 0 0 24 19.983V4.017a1.5 1.5 0 0 0-.85-1.43zm-5.146 14.861L10.826 12l7.178-5.448v10.896z"/></svg>
          Open in VS Code
        </button>
          </div>
        </div>
        <div id="detail-log-date-nav" class="log-date-nav detail-log-date-nav"></div>
        <div class="detail-log-wrap" style="height: calc(100vh - 100px); overflow-y: auto;">
          <div id="detail-log-output" class="detail-log-output"></div>
        </div>
      </div>

      <!-- Edit Process view -->
      <div id="view-edit" class="view" style="display:none">
        <div class="view-header">
          <h2 class="view-title">Edit Process</h2>
          <button onclick="showView('processes')">← Back</button>
        </div>

        <div class="form-card">
          <form class="start-form" onsubmit="saveProcessEdit(event)">
            <input type="hidden" id="ef-id"/>
            <div class="form-row">
              <div class="form-field">
                <label for="ef-script">Command <span class="required">*</span></label>
                <input id="ef-script" type="text" required/>
              </div>
              <div class="form-field">
                <label for="ef-name">Name</label>
                <input id="ef-name" type="text"/>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label for="ef-cwd">Working Directory</label>
                <input id="ef-cwd" type="text" placeholder="C:\Users\me\app"/>
              </div>
              <div class="form-field">
                <label for="ef-args">Args (space-separated)</label>
                <input id="ef-args" type="text"/>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label for="ef-env">Env Vars (KEY=VAL, comma-separated)</label>
                <input id="ef-env" type="text"/>
              </div>
              <div class="form-field">
                <label for="ef-namespace">Namespace</label>
                <input id="ef-namespace" type="text" placeholder="default"/>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label for="ef-max-restarts">Max Restarts</label>
                <input id="ef-max-restarts" type="text" placeholder="10"/>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field form-field-checks">
                <label class="check-label">
                  <input type="checkbox" id="ef-autorestart"/>
                  Auto-restart on crash
                </label>
                <label class="check-label">
                  <input type="checkbox" id="ef-watch"/>
                  Watch mode
                </label>
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn-primary">💾 Save & Apply</button>
              <span id="edit-form-error" class="form-error"></span>
            </div>
          </form>
        </div>
      </div>

    </div><!-- /.content -->
  </div><!-- /.layout -->

  <script src="/app.js"></script>
</body>
</html>
